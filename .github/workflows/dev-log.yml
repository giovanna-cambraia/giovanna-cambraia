name: Update Dev Log

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Every Monday 6am UTC
  workflow_dispatch:

jobs:
  update-dev-log:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Dev Log Block
        id: devlog
        shell: bash
        run: |
          set -euo pipefail

          SINCE="7 days ago"

          START_DATE=$(date -d "$SINCE" +"%b %d")
          END_DATE=$(date +"%b %d, %Y")

          TOTAL=$(git rev-list --count --since="$SINCE" HEAD || echo 0)

          # Collect commits (unique messages, newest first)
          COMMITS=$(git log --since="$SINCE" \
            --pretty=format:"%cd|%s" \
            --date=format:"%b %d" \
            | awk -F'|' '!seen[$2]++ {print "- `"$1"` "$2}' \
            | head -n 6)

          if [ -z "$COMMITS" ]; then
            COMMITS="_No commits this week — recharging ⚡_"
          fi

          # Branches touched in timeframe
          BRANCHES=$(git for-each-ref --format='%(refname:short)' refs/remotes/origin \
            | sed 's|origin/||' \
            | sort -u \
            | tr '\n' ', ' \
            | sed 's/, $//')

          if [ -z "$BRANCHES" ]; then
            BRANCHES="main"
          fi

          {
            echo "BLOCK<<EOF"
            echo ""
            echo "### 🗓️ $START_DATE – $END_DATE"
            echo ""
            echo "**$TOTAL commit(s)** across: \`$BRANCHES\`"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Inject into README
        env:
          BLOCK: ${{ steps.devlog.outputs.BLOCK }}
        run: |
          python3 - <<'PYEOF'
          import os
          import re
          import sys

          block = os.environ["BLOCK"]

          with open("README.md", encoding="utf-8") as f:
              content = f.read()

          start = "<!-- DEV_LOG:START -->"
          end = "<!-- DEV_LOG:END -->"

          if start not in content or end not in content:
              print("DEV_LOG markers not found.")
              sys.exit(1)

          pattern = rf"{re.escape(start)}.*?{re.escape(end)}"

          replacement = f"{start}\n{block}\n{end}"

          updated = re.sub(pattern, replacement, content, flags=re.DOTALL)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(updated)
          PYEOF

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "chore(readme): update dev log [skip ci]"
          git push
